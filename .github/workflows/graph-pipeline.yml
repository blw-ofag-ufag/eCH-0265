name: Graph Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/python/requirements.txt

      - name: Execute Pytest Suite
        run: pytest tests/ -v

      - name: Upload Warnings Report
        # Uploads the pytest warnings report as a downloadable artifact in the GitHub Actions UI
        # without committing it to the repository.
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: warnings-report
          path: tests/warnings_report.json
          retention-days: 14